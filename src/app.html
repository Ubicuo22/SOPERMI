<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover es crítico para safe-area en iPhone con notch -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0a0a0a" />

		<!-- PWA: comportamiento de app instalada en iOS/Android -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="SOPERMI" />
		<meta name="application-name" content="SOPERMI" />

		<!-- Íconos -->
		<link rel="icon" href="/icons/icon-192.png" />
		<link rel="apple-touch-icon" href="/icons/icon-180.png" />

		<!-- Splash screens iOS (fondo negro mientras carga) -->
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

		<title>SOPERMI</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
